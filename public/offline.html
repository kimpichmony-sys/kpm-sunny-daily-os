<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070d" />
    <title>KPM Sunny Daily OS Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070d;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 22% 18%, rgba(245, 158, 11, 0.18), transparent 30%),
          linear-gradient(135deg, #05070d, #09111f 52%, #02030a);
        color: #f8fafc;
        padding: 24px;
      }

      main {
        width: min(460px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
        padding: 28px;
      }

      .icon {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #fde68a, #f59e0b 60%, #f97316);
        color: #111827;
        font-weight: 900;
      }

      h1 {
        margin: 22px 0 8px;
        font-size: 32px;
        line-height: 1;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">KPM</div>
      <h1>Offline Mode</h1>
      <p>KPM Sunny Daily OS could not load this screen. Reopen a page you loaded before, or reconnect and try again. Your localStorage data stays on this device.</p>
    </main>
  </body>
</html>
